services:
  - type: web
    name: ndis-referral-system
    env: node
    buildCommand: npm install && cd client && npm install && npm run build && cd .. && npm run build:server
    startCommand: npm run db:migrate && npm run db:seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ndis-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: accuratehomecare.cs@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: ndis-db
    databaseName: ndis_referral
    user: ndis_user
    plan: free
